<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bio Body Track - Confirming...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<p>Opening Bio Body Track...</p>
<script>
  (function () {
    // Supabase puts tokens in the URL fragment (#)
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', ''));

    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type'); // 'magiclink', 'recovery', etc.

    if (accessToken) {
      // Redirect to your app's deep link scheme
      const deepLink =
        'com.datadrivennetworks.biobodytrack://login-callback/' +
        '#access_token=' + accessToken +
        '&refresh_token=' + (refreshToken || '') +
        '&type=' + (type || 'magiclink');

      window.location.href = deepLink;

      // Fallback: if app not installed after 2 seconds, show message
      setTimeout(function () {
        document.body.innerHTML =
          '<h2>Could not open the app.</h2><p>Please make sure Bio Body Track is installed.</p>';
      }, 2000);
    } else {
      document.body.innerHTML =
        '<h2>Invalid or expired link.</h2><p>Please request a new link.</p>';
    }
  })();
</script>
</body>
</html>
