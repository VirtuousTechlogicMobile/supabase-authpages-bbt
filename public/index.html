<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Healthcare AI Auth Debug</title>

  <style>
    body{
    font-family:monospace;
    padding:24px;
    background:#0f0f0f;
    color:#e0e0e0;
    font-size:14px;
    line-height:1.8;
    }

    h2{
    color:#7dd3fc;
    margin-top:24px;
    }

    .val{color:#86efac;}
    .null{color:#f87171;}
    .url{
    color:#fbbf24;
    word-break:break-all;
    }

    .box{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    padding:16px;
    margin:12px 0;
    }

    button{
    margin-top:20px;
    padding:10px 24px;
    background:#4F46E5;
    color:white;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Healthcare AI Auth Debug</h2>

<div class="box">
  <strong>Full URL:</strong><br>
  <span class="url" id="fullUrl"></span>
</div>

<div class="box">
  <strong>Hash:</strong><br>
  <span class="url" id="rawHash"></span>
</div>

<div class="box">
  <strong>Search:</strong><br>
  <span class="url" id="rawSearch"></span>
</div>

<h2>Parsed Values</h2>

<div class="box">
  <div>access_token → <span id="at"></span></div>
  <div>refresh_token → <span id="rt"></span></div>
  <div>type → <span id="tp"></span></div>
  <div>error → <span id="er"></span></div>
  <div>error_description → <span id="ed"></span></div>
</div>

<h2>Result</h2>
<div class="box" id="result"></div>

<button id="deepBtn" style="display:none">Open App</button>

<script>

  const p = new URLSearchParams(window.location.search);
  const h = new URLSearchParams(window.location.hash.substring(1));

  document.getElementById('fullUrl').textContent = window.location.href;
  document.getElementById('rawHash').textContent = window.location.hash || '(empty)';
  document.getElementById('rawSearch').textContent = window.location.search || '(empty)';

  function show(id,val){
  const el=document.getElementById(id);

  if(val){
  el.textContent=val;
  el.className='val';
  }else{
  el.textContent='(null)';
  el.className='null';
  }
  }

  const at = h.get('access_token') || p.get('access_token');
  const rt = h.get('refresh_token') || p.get('refresh_token');
  const tp = h.get('type') || p.get('type');
  const er = h.get('error') || p.get('error');
  const ed = h.get('error_description') || p.get('error_description');

  show('at',at);
  show('rt',rt);
  show('tp',tp);
  show('er',er);
  show('ed',ed);

  const result=document.getElementById('result');
  const btn=document.getElementById('deepBtn');

  if(ed || er){

  result.innerHTML='<span class="null">ERROR: '+(ed || er)+'</span>';

  }else if(at){

  const params=new URLSearchParams();

  params.set("access_token",at);

  if(rt){
  params.set("refresh_token",rt);
  }

  const deepLink=`healthcareai://confirmed?${params.toString()}`;

  result.innerHTML=
  '<span class="val">Token found! Opening app...</span><br><span class="url">'+deepLink+'</span>';

  btn.style.display='inline-block';

  btn.onclick=()=>{
  window.open(deepLink,"_self");
  };

  setTimeout(()=>{
  window.open(deepLink,"_self");
  },3000);

  }else{

  result.innerHTML=
  '<span class="null">No token found. Supabase redirect issue likely.</span>';

  }

</script>

</body>
</html>
