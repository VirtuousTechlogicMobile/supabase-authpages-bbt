<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bio Body Track - Confirming...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<p>Opening Bio Body Track...</p>
<script>
  (function () {
    // PKCE flow sends ?code= as query parameter
    const searchParams = new URLSearchParams(window.location.search);
    const code = searchParams.get('code');

    // Legacy flow sends #access_token in fragment
    const hash = window.location.hash;
    const hashParams = new URLSearchParams(hash.replace('#', ''));
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const type = hashParams.get('type');

    if (code) {
      // ✅ PKCE: pass code as query param to app
      const deepLink =
        'com.datadrivennetworks.biobodytrack://login-callback' +
        '?code=' + encodeURIComponent(code);

      window.location.href = deepLink;

      setTimeout(function () {
        document.body.innerHTML =
          '<h2>Could not open the app.</h2><p>Please make sure Bio Body Track is installed.</p>';
      }, 2000);

    } else if (accessToken) {
      // Legacy token flow
      const deepLink =
        'com.datadrivennetworks.biobodytrack://login-callback/' +
        '#access_token=' + accessToken +
        '&refresh_token=' + (refreshToken || '') +
        '&type=' + (type || 'magiclink');

      window.location.href = deepLink;

      setTimeout(function () {
        document.body.innerHTML =
          '<h2>Could not open the app.</h2><p>Please make sure Bio Body Track is installed.</p>';
      }, 2000);

    } else {
      document.body.innerHTML =
        '<h2>Invalid or expired link.</h2><p>Please request a new confirmation email.</p>';
    }
  })();
</script>
</body>
</html>
